<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Wisoff</title>
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body class="bg-water">

    <nav class="site-nav">
        <!-- Left slot: empty by default, back button injected here on blog posts -->
        <div id="nav-left"></div>

        <!-- Desktop nav links -->
        <div class="nav-links d-none d-lg-flex">
            <button class="nav-btn" hx-get="partials/home.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/">Home</button>
            <!-- <button class="nav-btn" hx-get="partials/portfolio.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/portfolio">Portfolio</button> -->
            <button class="nav-btn" hx-get="partials/blog.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/blog">Blog</button>
            <a class="nav-btn" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/charliewisoff/">LinkedIn</a>
            <a class="nav-btn" target="_blank" rel="noopener noreferrer" href="https://github.com/charlie763">GitHub</a>
        </div>

        <!-- Mobile: hamburger -->
        <div class="d-flex d-lg-none">
            <details class="mobile-menu">
                <summary>
                    <span class="hamburger-bar"></span>
                    <span class="hamburger-bar"></span>
                    <span class="hamburger-bar"></span>
                </summary>
                <div class="mobile-dropdown">
                    <button class="mobile-nav-btn" hx-get="partials/home.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/" hx-on:htmx:after-request="this.closest('details').open = false">Home</button>
                    <button class="mobile-nav-btn" hx-get="partials/portfolio.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/portfolio" hx-on:htmx:after-request="this.closest('details').open = false">Portfolio</button>
                    <button class="mobile-nav-btn" hx-get="partials/blog.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/blog" hx-on:htmx:after-request="this.closest('details').open = false">Blog</button>
                    <a class="mobile-nav-btn" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/charliewisoff/">LinkedIn</a>
                </div>
            </details>
        </div>
    </nav>

    <!-- Content is loaded by the init script below based on URL params -->
    <div id="content"></div>

    <script>
        // Load the correct content on initial page load / refresh based on URL path.
        // /blog            → blog index
        // /portfolio       → portfolio
        // /blog/post-name  → a specific blog post
        // /                → home
        document.addEventListener('DOMContentLoaded', function() {
            var redirectPath = sessionStorage.getItem('__spa_redirect');
            if (redirectPath) {
                sessionStorage.removeItem('__spa_redirect');
                history.replaceState(null, '', redirectPath);
            }

            var pathname = window.location.pathname;
            var path;
            if (pathname === '/blog') {
                path = 'partials/blog.html';
            } else if (pathname === '/portfolio') {
                path = 'partials/portfolio.html';
            } else if (pathname.startsWith('/blog/')) {
                path = 'blog/' + pathname.replace('/blog/', '') + '.md';
            } else {
                path = 'partials/home.html';
            }

            htmx.ajax('GET', path, {target: '#content', swap: 'innerHTML'});
        });

        // Render markdown blog posts and inject the ← Blog back button into the navbar.
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            var path = evt.detail.requestConfig && evt.detail.requestConfig.path;
            if (path && path.endsWith('.md')) {
                evt.detail.serverResponse =
                    '<div id="nav-left" hx-swap-oob="true">' +
                        '<button class="nav-btn" hx-get="partials/blog.html" hx-target="#content" hx-swap="innerHTML" hx-push-url="/blog">&#8592; Blog</button>' +
                    '</div>' +
                    '<div class="blog-content py-4">' +
                        marked.parse(evt.detail.serverResponse) +
                    '</div>';
            }
        });
    </script>
</body>
</html>
